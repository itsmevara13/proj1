apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-api
  namespace: proj1-gitops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-api
  template:
    metadata:
      labels:
        app: todo-api
    spec:
      containers:
        - name: todo-api
          image: todo-api:1.0.0
          imagePullPolicy: Never       # use local Minikube image
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: todo-api-config
          readinessProbe:
            httpGet:
              path: /api/todos
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/todos
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi