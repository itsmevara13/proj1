apiVersion: v1
kind: ConfigMap
metadata:
  name: todo-api-code
  namespace: todo-app
data:
  server.js: |
    const http = require('http');
    const { MongoClient, ObjectId } = require('mongodb');

    const MONGO_URI = process.env.MONGO_URI || 'mongodb://mongo:27017';
    const PORT = parseInt(process.env.PORT || '5000');

    let db;

    MongoClient.connect(MONGO_URI)
      .then(client => {
        db = client.db('todos');
        console.log('Connected to MongoDB');
      })
      .catch(err => {
        console.error('MongoDB connection error:', err);
        process.exit(1);
      });

    function sendJSON(res, status, data) {
      res.writeHead(status, {
        'Content-Type': 'application/json',
        'Access-Control-Allow-Origin': '*',
        'Access-Control-Allow-Methods': 'GET,POST,PATCH,DELETE,OPTIONS',
        'Access-Control-Allow-Headers': 'Content-Type'
      });
      res.end(JSON.stringify(data));
    }

    function readBody(req) {
      return new Promise((resolve) => {
        let body = '';
        req.on('data', chunk => body += chunk);
        req.on('end', () => {
          try { resolve(JSON.parse(body)); }
          catch { resolve({}); }
        });
      });
    }

    const server = http.createServer(async (req, res) => {
      if (req.method === 'OPTIONS') {
        sendJSON(res, 204, {});
        return;
      }

      const url = req.url.replace(/\/$/, '');

      // GET /api/todos
      if (req.method === 'GET' && url === '/api/todos') {
        const todos = await db.collection('todos')
          .find().sort({ createdAt: -1 }).toArray();
        sendJSON(res, 200, todos);
        return;
      }

      // POST /api/todos
      if (req.method === 'POST' && url === '/api/todos') {
        const body = await readBody(req);
        const todo = { text: body.text, done: false, createdAt: new Date() };
        const result = await db.collection('todos').insertOne(todo);
        sendJSON(res, 201, { ...todo, _id: result.insertedId });
        return;
      }

      // PATCH /api/todos/:id
      if (req.method === 'PATCH' && url.startsWith('/api/todos/')) {
        const id = url.split('/').pop();
        const body = await readBody(req);
        await db.collection('todos').updateOne(
          { _id: new ObjectId(id) },
          { $set: { done: body.done } }
        );
        const todo = await db.collection('todos').findOne({ _id: new ObjectId(id) });
        sendJSON(res, 200, todo);
        return;
      }

      // DELETE /api/todos/:id
      if (req.method === 'DELETE' && url.startsWith('/api/todos/')) {
        const id = url.split('/').pop();
        await db.collection('todos').deleteOne({ _id: new ObjectId(id) });
        res.writeHead(204); res.end();
        return;
      }

      // health check
      if (url === '/healthz') {
        sendJSON(res, 200, { status: 'ok' });
        return;
      }

      sendJSON(res, 404, { error: 'not found' });
    });

    server.listen(PORT, () => console.log(`API listening on ${PORT}`));